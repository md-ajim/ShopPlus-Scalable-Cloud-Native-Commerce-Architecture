services:
  backend:
    build: ./backend
    platform: linux/amd64
    container_name: shopplus-backend
    networks:
      - shopplus-network
    # depends_on:
    #   - mysql
    env_file:
      - ./backend/.env
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    restart: always

  frontend:
    build: ./frontend
    container_name: shopplus-frontend
    networks:
      - shopplus-network
    env_file:
      - ./frontend/.env
    expose:
      - "3000"
    restart: always

  # mysql:
  #   image: mysql:8
  #   container_name: shopplus-mysql
  #   restart: always
  #   environment:
  #     MYSQL_DATABASE: shopplus_db
  #     MYSQL_ROOT_PASSWORD: 
  #   expose:
  #     - "3306"
  #   networks:
  #     - shopplus-network
  #   volumes:
  #     - mysql_data:/var/lib/mysql      

  nginx:
    image: nginx:stable-alpine
    container_name: shopplus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend
    networks:
      - shopplus-network
    restart: always

volumes:
  static_volume:
  media_volume:

networks:
  shopplus-network:
    driver: bridge



