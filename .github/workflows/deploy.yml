name: Deploy to Ubuntu Linux EC2

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" 2>/dev/null >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=120 \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          cd ~/ShopPlus-Scalable-Cloud-Native-Commerce-Architecture

          echo "Pull latest code"
          git fetch origin
          git reset --hard origin/main

          echo "Build images (zero downtime approach)"
          docker compose build

          echo "Restart containers"
          docker compose up -d --remove-orphans

          echo "Waiting for backend..."
          until docker compose exec -T backend echo "ready" >/dev/null 2>&1; do
            sleep 3
          done

          echo "Run migrations"
          docker compose exec -T backend python manage.py migrate --noinput

          echo "Collect static files"
          docker compose exec -T backend python manage.py collectstatic --noinput

          echo "Cleanup images"
          docker image prune -f

          echo "Deployment finished successfully"
          EOF