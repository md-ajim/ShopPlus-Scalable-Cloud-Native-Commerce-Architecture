# Self-Hosted Deployment Workflow for ShopPlus on EC2 - This workflow is designed to run directly on your EC2 instance, allowing for a seamless deployment process without the need for SSH. It will pull the latest code, build new Docker images, and refresh the containers with zero downtime.

name: ShopPlus Self-Hosted Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted  # This will run inside your EC2

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Environment Files
        run: |
          cp /home/ubuntu/shopplus/backend/.env ./backend/.env
          chmod +x ./backend/.env
          echo "Backend .env file copied successfully."
          chmod +x ./frontend/.env
          echo "Frontend .env file copied successfully."
          cp /home/ubuntu/shopplus/frontend/.env ./frontend/.env
          echo "Environment files synced successfully for both frontend and backend."

      - name: Build New Images
        run: |
          echo "Building images (Site is STILL ONLINE)..."
          docker compose build

      - name: Refresh Containers (Zero Downtime)
        run: |
          echo "Refreshing containers..."
          docker compose up -d --remove-orphans

      - name: Run Database Migrations
        run: |
          echo "Waiting for database..."
          sleep 10
          docker compose exec -T backend python manage.py migrate --noinput

      - name: Collect Static Files
        run: |
          docker compose exec -T backend python manage.py collectstatic --noinput

      - name: Cleanup Old Images
        run: |
          echo "Cleaning up old images..."
          docker image prune -f

      - name: Deployment Finished
        run: echo "ShopPlus is now live and updated!"


