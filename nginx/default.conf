server {
    listen 80;

    location / {
        proxy_pass http://shopplus-frontend:3000; # সার্ভিস নাম 'shopplus-frontend' দিন (docker-compose অনুযায়ী)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API calls → Lambda
    location /api/ {
    # আপনার ল্যাম্বডা এপিআই ইউআরএল (শেষে স্ল্যাশ সহ)
    proxy_pass https://6mhnihhftl.execute-api.us-east-1.amazonaws.com/dev/api/;

    # Host header অবশ্যই API Gateway এর ডোমেইন হতে হবে
    proxy_set_header Host 6mhnihhftl.execute-api.us-east-1.amazonaws.com;
    
    # SSL SNI সাপোর্ট (এটি ছাড়া ৫‌০২ আসে সাধারণত)
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    # অন্যান্য প্রয়োজনীয় হেডার
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # বাফারিং ইস্যু এড়াতে (ঐচ্ছিক)
    proxy_buffering off;
    
    }
}