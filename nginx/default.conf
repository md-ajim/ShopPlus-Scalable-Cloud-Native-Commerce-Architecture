
client_max_body_size 50M;

server {
    listen 80;
    server_name _;

    # Global Proxy Headers (Professional Standards)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ================= 1. NextAuth Protection =================
    location /api/auth/ {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Access Denied 
        # proxy_cookie_path / "/; HTTPOnly; Secure";
        proxy_cookie_path / "/; HTTPOnly";
    }

# ================= 2. Django API =================
    location /api/ {
        proxy_pass http://backend:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # ================= 3. Django Admin (Unfold Theme Friendly) =================
    location /admin/ {
        proxy_pass http://backend:8000;
    }

    # ================= 4. Static Files (AWS S3 Proxy) =================
#     location /static/ {
#         proxy_pass https://d2jlzos2a8il9t.cloudfront.net/static/;
#         proxy_set_header Host d2jlzos2a8il9t.cloudfront.net;
#         proxy_hide_header x-amz-id-2;
#         proxy_hide_header x-amz-request-id;
#         proxy_ignore_headers Set-Cookie;
#         add_header Cache-Control "public, max-age=31536000, immutable";
# }

#     # ================= 5. Media Files (AWS S3 Proxy) =================
#     location /media/ {
#         proxy_pass https://d2jlzos2a8il9t.cloudfront.net/media/;
#         proxy_set_header Host d2jlzos2a8il9t.cloudfront.net;
#         proxy_hide_header x-amz-id-2;
#         proxy_hide_header x-amz-request-id;
#         add_header Cache-Control "public, max-age=31536000";
# }

   # ================= 4. Static Files (AWS S3 Proxy) =================
    location /static/ {
        proxy_pass https://d2jlzos2a8il9t.cloudfront.net/static/;
        proxy_set_header Host d2jlzos2a8il9t.cloudfront.net;
        
        # CloudFront এর জন্য এই লাইনটি অত্যন্ত জরুরি
        proxy_ssl_server_name on; 
        
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        proxy_ignore_headers Set-Cookie;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ================= 5. Media Files (AWS S3 Proxy) =================
    location /media/ {
        proxy_pass https://d2jlzos2a8il9t.cloudfront.net/media/;
        proxy_set_header Host d2jlzos2a8il9t.cloudfront.net;
        
        # CloudFront এর জন্য এই লাইনটি অত্যন্ত জরুরি
        proxy_ssl_server_name on; 
        
        proxy_hide_header x-amz-id-2;
        proxy_hide_header x-amz-request-id;
        add_header Cache-Control "public, max-age=31536000";
    }

    # ================= 6. Next.js Frontend =================
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}


